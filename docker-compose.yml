services:
  web:
    image: php:7.4-apache
    container_name: wegia-web
    ports:
      - "8080:80"
    volumes:
      - ./WeGIA:/var/www/html/WeGIA
    depends_on:
      - db
    command: >
      bash -c "docker-php-ext-install mysqli pdo pdo_mysql &&
               apache2-foreground"

  db:
    image: mariadb:10.6
    container_name: wegia-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wegia
      MYSQL_USER: wegia
      MYSQL_PASSWORD: wegia
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: